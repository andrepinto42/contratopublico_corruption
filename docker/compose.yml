  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  #     - POSTGRES_DB=contratopublico
  #     - BIND_URL=0.0.0.0:3000

  cli:
    profiles: ["manual"]
    restart: "no"
    depends_on:
      - meilisearch
      - postgres
    build:
      context: ../backend
    volumes:
      - ${DATA_FOLDER}/scraper:/data/scraper
    environment:
      - RUST_LOG=info
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5111
      - POSTGRES_USER=contratopublico
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=contratopublico
    entrypoint: ["/usr/local/bin/cli"]

